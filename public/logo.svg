<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- OpenBlock Logo - Simple Block Design -->
  <defs>
    <linearGradient id="blockGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#f8fafc" stroke="#6366f1" stroke-width="3"/>
  
  <!-- Block Structure -->
  <g transform="translate(50, 50)">
    <!-- Top Block -->
    <rect x="0" y="0" width="40" height="40" rx="6" fill="url(#blockGradient)"/>
    <rect x="50" y="0" width="40" height="40" rx="6" fill="url(#blockGradient)" opacity="0.8"/>
    
    <!-- Middle Block -->
    <rect x="25" y="50" width="40" height="40" rx="6" fill="url(#blockGradient)"/>
    
    <!-- Bottom Block -->
    <rect x="0" y="100" width="40" height="40" rx="6" fill="url(#blockGradient)" opacity="0.9"/>
    <rect x="50" y="100" width="40" height="40" rx="6" fill="url(#blockGradient)" opacity="0.7"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#475569" text-anchor="middle">OpenBlock</text>
</svg>
